<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        h1{
            font-family: "Great Vibes", cursive;
            font-size: 40px;
        }
    </style>


</head>

<body class="d-flex flex-column min-vh-100">

 
    <video autoplay muted loop playsinline
    class="position-fixed top-0 start-0 w-100 h-100 object-fit-cover"
    style="z-index: -2;">

        <source src="Sabrina Carpenter Kissing Screen Wallpaper 4K HD - Estawky (1080p, h264).mp4" type="video/mp4">

    </video>


    <div class="position-fixed top-0 start-0 w-100 h-100 bg-dark opacity-50"
    style="z-index: -1;">
    </div>


    <header class="text-white p-3"
    style="background-color:#87CEEB">

        <div class="container d-flex justify-content-between align-items-center">

         <h1 class="h3"
            style="color: #FFF3B0; font-size: 40px; ">
                Sabrina HomePage
            </h1>

            <button class="btn btn-light"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#menu">

                ☰ Menu

            </button>

        </div>

    </header>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menu">

        <div class="offcanvas-header">

            <h5 class="offcanvas-title">
                Menu
            </h5>

            <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas">
            </button>

        </div>

        <div class="offcanvas-body">

            <a href="index.html"
            class="btn btn-primary w-100 mb-2"
            style="background-color: #87CEEB; border: none;">

                Login

            </a>

            <a href="cadastro.html"
            class="btn btn-success w-100"
            style="background-color: #F8C8DC; border: none; color: black;">

                Cadastro

            </a>

        </div>

    </div>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">

        <div class="row w-100 justify-content-center">

            <div class="col-md-7">


                <div class="card p-4 shadow bg-white bg-opacity-75">

                    <h2 class="text-center mb-4">
                        Cadastro
                    </h2>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Nome Completo
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                E-mail
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Senha
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Confirmar Senha
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label d-block">
                                Tipo de Usuário
                            </label>

                            <div class="form-check form-check-inline">

                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="usuario"
                                    required>

                                <label class="form-check-label">
                                    Aluno
                                </label>

                            </div>

                            <div class="form-check form-check-inline">

                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="usuario">

                                <label class="form-check-label">
                                    Professor
                                </label>

                            </div>

                            <div class="form-check form-check-inline">

                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="usuario">

                                <label class="form-check-label">
                                    Coordenador
                                </label>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Escolaridade
                            </label>

                            <select class="form-select" required>

                                <option value="">
                                    Selecione
                                </option>

                                <option>
                                    Ensino Fundamental
                                </option>

                                <option>
                                    Ensino Médio
                                </option>

                                <option>
                                    Graduação
                                </option>

                                <option>
                                    Pós-graduação
                                </option>

                                <option>
                                    Mestrado
                                </option>

                            </select>

                        </div>
          
                        <div class="form-check mb-3">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                required>

                            <label class="form-check-label">
                                Aceito os termos
                            </label>

                        </div>

                        <button
                            type="submit"
                            class="btn w-100"
                            style="
                            background-color: #FFF3B0;
                            color: #333;
                            border: none;
                            outline: none;
                            box-shadow: none;
                            ">

                            Cadastrar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>


    <footer class="text-white text-center p-3"
    style="background-color: #F8C8DC;">

        <p class="mb-0">
            © 2026 Carpenter By Kaukss
        </p>

    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
